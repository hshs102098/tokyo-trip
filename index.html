    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                        serif: ['"Noto Serif TC"', 'serif'],

                        'jp-sand': '#e5ddd0',

    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }

        ::-webkit-scrollbar-thumb { background: #d4cfc7; border-radius: 10px; }
        
        body { background-color: #f6f4f0; color: #2c302e; }
        
        /* 鎖定背景滑動（當封面還在時） */
        body.locked { overflow: hidden; }

        .section-hidden { display: none; }
        .timeline-dot { width: 12px; height: 12px; background-color: #8b7a66; border-radius: 50%; position: absolute; left: -6px; top: 6px; }
        input[type="checkbox"] { accent-color: #879471; }
        input[type="checkbox"]:checked + span { text-decoration: line-through; color: #9ca3af; }

        /* --- 新增：專屬封面頁樣式 --- */
        #cover-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* 將檔名設定為 cover.jpg，背景顏色抓取圖片邊緣的米色 */
            background-color: #e5e4de; 
            background-image: url('cover.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 9999;
            cursor: pointer;
            display: flex;
            align-items: flex-end; /* 讓文字靠下 */
            justify-content: center;
            padding-bottom: 15vh;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        /* 封面消失的動畫狀態 */
        #cover-page.hidden {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }

        /* 點擊提示文字的呼吸燈特效 */
        .cover-instruction {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(5px);
            padding: 12px 24px;
            border-radius: 30px;
            color: #8b7a66;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            animation: pulse 2s infinite ease-in-out;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-5px); }
        }
    </style>
</head>

            // 移除 body 的 locked，允許往下捲動瀏覽

        function switchTab(tabId) {
            document.getElementById('overview-section').style.display = 'none';
            document.getElementById('itinerary-section').style.display = 'none';
            document.getElementById('food-section').style.display = 'none';
            document.getElementById('checklist-section').style.display = 'none';
            
            document.getElementById(tabId + '-section').style.display = 'block';

            document.querySelectorAll('.nav-btn').forEach(function(btn) {
                if (btn.getAttribute('data-target') === tabId) {
                    btn.classList.add('border-jp-matcha', 'text-jp-matcha');
                    btn.classList.remove('border-transparent', 'text-jp-ink');
                } else {
                    btn.classList.remove('border-jp-matcha', 'text-jp-matcha');
                    btn.classList.add('border-transparent', 'text-jp-ink');
                }
            });
        }

                });

                const html = '<div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100 flex flex-col">' +
                    '<h3 class="text-lg font-bold mb-4 border-l-4 border-jp-wood pl-3 text-jp-ink flex items-center">' +
                        '<span class="mr-2">' + section.icon + '</span> ' + section.category +
                    '</h3>' +
                    '<div class="grid grid-cols-2 gap-y-3 gap-x-2">' +
                        itemsHtml +
                    '</div>' +
                '</div>';
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        function renderTimeline(day) {
            const container = document.getElementById('timeline-container');
            container.innerHTML = ''; 
            
            const btns = document.querySelectorAll('.day-btn');
            btns.forEach(function(btn, index) {
                if(index + 1 === day) {
                    btn.className = 'day-btn px-4 py-2 bg-jp-wood text-white rounded-md text-sm transition-colors whitespace-nowrap';
                } else {
                    btn.className = 'day-btn px-4 py-2 bg-white border border-gray-200 text-gray-600 rounded-md text-sm hover:bg-gray-50 transition-colors whitespace-nowrap';
                }
            });

            const dayData = tripData[day];
            
            dayData.forEach(function(item) {
                const mapLinkHtml = item.map 
                    ? '<a href="' + getMapUrl(item.map) + '" target="_blank" class="inline-flex items-center mt-2 text-xs text-blue-600 hover:text-blue-800 bg-blue-50 px-2 py-1 rounded transition-colors">🗺️ Google Maps</a>' 
                    : '';
                
                const memoHtml = item.memo ? '<p class="text-sm text-gray-500 mt-1">' + item.memo + '</p>' : '';
                const routeHtml = item.route ? '<p class="text-sm font-medium text-jp-matcha mt-1">' + item.route + '</p>' : '';
                const durationHtml = item.duration ? '<p class="text-xs text-gray-400 mt-1">⏳ ' + item.duration + '</p>' : '';

                const html = '<div class="relative pl-6 sm:pl-8 pb-2 hover:bg-gray-50/50 rounded-r-lg transition-colors p-2 -ml-2">' +
                    '<div class="timeline-dot"></div>' +
                    '<div class="flex flex-col sm:flex-row sm:items-start">' +
                        '<div class="w-24 shrink-0 font-bold text-jp-wood text-sm sm:text-base mb-1 sm:mb-0 pt-0.5">' +
                            item.time +
                        '</div>' +
                        '<div class="flex-1">' +
                            '<h3 class="text-base font-bold text-jp-ink flex items-center">' +
                                '<span class="mr-2">' + item.icon + '</span> ' + item.title +
                            '</h3>' +
                            routeHtml +
                            durationHtml +
                            memoHtml +
                            mapLinkHtml +
                        '</div>' +
                    '</div>' +
                '</div>';
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        function filterFood(type) {
            const grid = document.getElementById('food-grid');
            grid.innerHTML = '';
            
            const btns = document.querySelectorAll('.food-filter');
            btns.forEach(function(btn) {
                if (btn.getAttribute('onclick').includes(type)) {
                    btn.className = 'food-filter px-4 py-1.5 bg-jp-matcha text-white rounded-full text-sm';
                } else {
                    btn.className = 'food-filter px-4 py-1.5 bg-white border border-gray-300 text-gray-600 rounded-full text-sm hover:bg-gray-50';
                }
            });

            const filteredData = type === 'all' ? foodData : foodData.filter(function(food) { return food.type === type; });

            filteredData.forEach(function(food) {
                let badgeColor = 'bg-gray-100 text-gray-600';
                let typeLabel = '其他';
                if(food.type === 'main') { badgeColor = 'bg-red-50 text-red-600 border border-red-100'; typeLabel = '正餐'; }
                if(food.type === 'snack') { badgeColor = 'bg-orange-50 text-orange-600 border border-orange-100'; typeLabel = '小吃'; }
                if(food.type === 'dessert') { badgeColor = 'bg-pink-50 text-pink-600 border border-pink-100'; typeLabel = '甜點'; }

                const html = '<div class="bg-white p-5 rounded-xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow group flex flex-col h-full">' +
                    '<div class="flex justify-between items-start mb-3">' +
                        '<span class="text-xs font-bold px-2 py-1 rounded ' + badgeColor + '">' + typeLabel + '</span>' +
                        '<span class="text-xs text-gray-400 bg-gray-50 px-2 py-1 rounded">📍 ' + food.loc + '</span>' +
                    '</div>' +
                    '<h3 class="text-lg font-bold mb-2 group-hover:text-jp-matcha transition-colors">' + food.name + '</h3>' +
                    '<div class="mt-auto pt-4">' +
                        '<a href="' + getMapUrl(food.map) + '" target="_blank" class="block w-full text-center text-sm bg-jp-paper hover:bg-jp-sand text-jp-ink py-2 rounded transition-colors font-medium">查看 Google Maps</a>' +
                    '</div>' +
                '</div>';
                grid.insertAdjacentHTML('beforeend', html);
            });
        }

        window.onload = function() {
            document.querySelector('[data-target="overview"]').classList.add('border-jp-matcha', 'text-jp-matcha');
            document.querySelector('[data-target="overview"]').classList.remove('border-transparent', 'text-jp-ink');
            
            renderChecklist(); 
            renderTimeline(1); 
            filterFood('all'); 
        };

    </script>
</body>
</html>
